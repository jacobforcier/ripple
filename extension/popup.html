<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ripple</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #07070f;
      color: #e2e8f0;
      font-family: -apple-system, 'Inter', system-ui, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #5b8af5, #38bdf8);
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wordmark {
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(90deg, #5b8af5, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── States ── */
    #state-loading, #state-not-product, #state-product { display: none; }
    #state-loading.active, #state-not-product.active, #state-product.active {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(91, 138, 245, 0.3);
      border-top-color: #5b8af5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 8px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .not-product-icon { font-size: 28px; text-align: center; }
    .not-product-text {
      text-align: center;
      color: #94a3b8;
      line-height: 1.5;
    }
    .not-product-text strong {
      display: block;
      color: #e2e8f0;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .domain-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      align-self: flex-start;
    }

    .domain-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5b8af5, #38bdf8);
      flex-shrink: 0;
    }

    .product-title {
      font-size: 13px;
      font-weight: 500;
      color: #cbd5e1;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .divider { height: 1px; background: rgba(255,255,255,0.06); }

    /* ── Copy button ── */
    .copy-btn {
      width: 100%;
      padding: 11px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #5b8af5, #38bdf8);
      transition: opacity 0.15s, transform 0.1s;
    }
    .copy-btn:hover:not(:disabled) { opacity: 0.9; }
    .copy-btn:active:not(:disabled) { transform: scale(0.98); }
    .copy-btn:disabled { cursor: default; }
    .copy-btn.success { background: linear-gradient(135deg, #22c55e, #16a34a); }

    .btn-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-icon { width: 16px; height: 16px; flex-shrink: 0; }

    .footer {
      font-size: 11px;
      color: rgba(148,163,184,0.45);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="logo">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 8c1.5-3 3.5-3 5 0s3.5 3 5 0" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M3.5 11.5c1-2 2.5-2 3.5 0s2.5 2 3.5 0" stroke="rgba(255,255,255,0.55)" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="wordmark">Ripple</span>
    </div>

    <div id="state-loading">
      <div class="spinner"></div>
    </div>

    <div id="state-not-product">
      <div class="not-product-icon">🛍️</div>
      <div class="not-product-text">
        <strong>No product detected</strong>
        Browse to a product page on Amazon, Target, Etsy, and more — then click Ripple to share.
      </div>
    </div>

    <div id="state-product">
      <div id="domain-badge" class="domain-badge">
        <span class="domain-dot"></span>
        <span id="domain-label"></span>
      </div>
      <div id="product-title" class="product-title"></div>
      <div class="divider"></div>
      <button id="copy-btn" class="copy-btn">
        <span class="btn-label">
          <svg id="btn-icon" class="btn-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.5 9.5a3.535 3.535 0 0 0 5 0l2-2a3.536 3.536 0 0 0-5-5l-1 1" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M9.5 6.5a3.535 3.535 0 0 0-5 0l-2 2a3.536 3.536 0 0 0 5 5l1-1" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span id="btn-text">Copy Ripple link</span>
        </span>
      </button>
    </div>

    <div class="footer">Powered by Ripple &amp; Skimlinks</div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
